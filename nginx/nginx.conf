# Run worker processes under nginx user for security
user  nginx;
worker_processes auto;

events {
    worker_connections 10240;   # รองรับ concurrent connections เยอะ
    multi_accept on;            # worker รับ connections หลายตัวพร้อมกัน
}

http {
    # Security # ป้องกันการโจมตีผ่านการเปิดเผยข้อมูล server
    server_tokens off;          # ไม่โชว์ version ลดการเปิดเผยข้อมูล

    # MIME types
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $host [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'urt=$upstream_response_time uht=$upstream_header_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance tuning
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Upload size
    client_max_body_size 50m;

    # Compression
    # gzip on;
    # gzip_comp_level 5;
    # gzip_min_length 1024;
    # gzip_types text/plain application/json application/javascript text/css;
    # gzip_types text/plain text/css application/json application/javascript application/xml text/javascript image/svg+xml;

    # Rate limiting & connection limiting
    limit_req_zone $binary_remote_addr zone=req_limit:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Include configs
    include /etc/nginx/upstream/*.conf;
    include /etc/nginx/conf.d/*.conf;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # map $sent_http_content_type $static_cache_control {
    #     default                                   "no-cache";
    #     "text/css"                                "public, max-age=604800, immutable";
    #     "application/javascript"                  "public, max-age=604800, immutable";
    #     "image/svg+xml"                           "public, max-age=604800, immutable";
    #     "image/png"                               "public, max-age=604800, immutable";
    #     "image/jpeg"                              "public, max-age=604800, immutable";
    # }
}